{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}rev-ce-builder{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'inventory:device_list' %}">rev-ce-builder</a>
      <div class="d-flex text-light small">
        {% if user.is_authenticated %}
          <span class="me-3">{{ user.username }}</span>
          <a href="/admin/" class="text-light text-decoration-none me-3">admin</a>
          <form action="{% url 'logout' %}" method="post" class="d-inline">
            {% csrf_token %}
            <button class="btn btn-sm btn-outline-light" type="submit">log out</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="text-light">log in</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container-fluid">
    {% if messages %}
      {% for m in messages %}
        <div class="alert alert-{{ m.tags|default:'info' }}">{{ m }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
